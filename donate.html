<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赞赏支持</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #222; line-height: 1.6; }
.container { max-width: 480px; margin: 0 auto; padding: 24px 16px; }
a { color: #666; text-decoration: none; font-size: 0.85rem; }
a:hover { color: #000; }
h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
.subtitle { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 20px; text-align: center; }
.qrcode { max-width: 240px; width: 100%; height: auto; margin-bottom: 12px; }
.label { color: #666; font-size: 0.8rem; }
.platform-name { font-size: 1rem; font-weight: 500; margin-bottom: 8px; }
.tip { color: #999; font-size: 0.8rem; margin-top: 16px; text-align: center; }
.gutter { height: 12px; }
</style>
</head>
<body>
<div class="container">
<a href="index.html">&larr; 返回工具集</a>
<h1>赞赏支持</h1>
<p class="subtitle">如果工具对你有帮助，欢迎请一杯咖啡</p>

<div class="card">
  <div class="platform-name">微信</div>
  <img src="wechat.jpg" alt="微信收款码" class="qrcode">
  <div class="label">微信扫一扫</div>
</div>

<div class="gutter"></div>

<div class="card">
  <div class="platform-name">支付宝</div>
  <img src="alipay.jpg" alt="支付宝收款码" class="qrcode">
  <div class="label">支付宝扫一扫</div>
</div>

<div class="tip">感谢支持！每一份赞赏都是继续做免费工具的动力</div>
</div>
</body>
</html>
