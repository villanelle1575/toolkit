<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收支记账</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #222; font-size: 14px; line-height: 1.5; }
.container { max-width: 640px; margin: 0 auto; padding: 20px 12px; }
a { color: #444; text-decoration: none; font-size: 0.85rem; }
a:hover { color: #000; }
h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 4px; }
.sub { color: #888; font-size: 0.85rem; margin-bottom: 16px; }
.row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
input, select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; background: #fff; }
input:focus, select:focus { outline: none; border-color: #666; }
input[type="text"] { flex: 1; min-width: 100px; }
input[type="number"] { width: 120px; }
button { padding: 6px 14px; border: 1px solid #888; border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.9rem; }
button:hover { background: #f0f0f0; }
button.primary { background: #222; color: #fff; border-color: #222; }
button.primary:hover { background: #444; }
.section { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 16px; margin-bottom: 10px; }
.summary { display: flex; gap: 12px; flex-wrap: wrap; }
.summary-item { flex: 1; min-width: 100px; text-align: center; padding: 8px; background: #fafafa; border-radius: 4px; }
.summary-item .num { font-size: 1.2rem; font-weight: 600; }
.summary-item .lbl { font-size: 0.75rem; color: #888; margin-top: 2px; }
.income { color: #080; }
.expense { color: #c00; }
.entry { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
.entry:last-child { border: none; }
.entry .amt { font-weight: 500; min-width: 70px; text-align: right; }
.entry .cat { color: #888; font-size: 0.8rem; min-width: 50px; }
.entry .note { flex: 1; color: #555; }
.entry .date2 { color: #aaa; font-size: 0.78rem; min-width: 70px; }
.entry .del { color: #c00; cursor: pointer; padding: 2px 6px; }
.filter-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
.tag { display: inline-block; padding: 2px 10px; border-radius: 3px; font-size: 0.8rem; cursor: pointer; border: 1px solid #ddd; background: #fff; }
.tag.active { background: #222; color: #fff; border-color: #222; }
.empty { color: #999; font-size: 0.85rem; padding: 20px 0; text-align: center; }
.mt-8 { margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
<a href="../index.html">&larr; 返回工具集</a>
<h1>收支记账</h1>
<p class="sub">记录每日收支，自动汇总</p>

<div class="section">
  <div class="summary" id="summary"></div>
</div>

<div class="section">
  <div class="row">
    <select id="typeSelect">
      <option value="expense">支出</option>
      <option value="income">收入</option>
    </select>
    <select id="catSelect">
      <option value="餐饮">餐饮</option><option value="购物">购物</option>
      <option value="交通">交通</option><option value="娱乐">娱乐</option>
      <option value="居住">居住</option><option value="医疗">医疗</option>
      <option value="教育">教育</option><option value="工资">工资</option>
      <option value="红包">红包</option><option value="其他">其他</option>
    </select>
    <input type="number" id="amtInput" placeholder="0.00" min="0" step="0.01">
    <input type="text" id="noteInput" placeholder="备注（可选）" style="flex:1;min-width:80px;">
    <button class="primary" onclick="addEntry()">添加</button>
  </div>
</div>

<div class="section">
  <div class="filter-bar">
    <span class="tag active" onclick="setFilter(this,'all')">全部</span>
    <span class="tag" onclick="setFilter(this,'income')">收入</span>
    <span class="tag" onclick="setFilter(this,'expense')">支出</span>
    <span style="flex:1;"></span>
    <button onclick="clearAll()" style="font-size:0.8rem;color:#c00;border-color:#ecc;">清除所有</button>
  </div>
  <div id="entryList"></div>
</div>

<script>
let entries = [];
let currentFilter = 'all';

try {
  entries = JSON.parse(localStorage.getItem('ledger_entries') || '[]');
} catch(e) {}

function save() {
  localStorage.setItem('ledger_entries', JSON.stringify(entries));
}

function addEntry() {
  const type = document.getElementById('typeSelect').value;
  const cat = document.getElementById('catSelect').value;
  const amt = parseFloat(document.getElementById('amtInput').value);
  const note = document.getElementById('noteInput').value.trim();
  if (!amt || amt <= 0) { alert('请输入有效金额'); return; }
  entries.unshift({ type, cat, amt, note, date: new Date().toISOString().slice(0,10) });
  save();
  document.getElementById('amtInput').value = '';
  document.getElementById('noteInput').value = '';
  render();
}

function delEntry(idx) {
  const realIdx = filteredIndices[idx];
  entries.splice(realIdx, 1);
  save();
  render();
}

function clearAll() {
  if (!confirm('确定清除所有记录？')) return;
  entries = [];
  save();
  render();
}

function setFilter(el, type) {
  currentFilter = type;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

let filteredIndices = [];

function render() {
  // Summary
  let totalIncome = 0, totalExpense = 0;
  entries.forEach(e => {
    if (e.type === 'income') totalIncome += e.amt;
    else totalExpense += e.amt;
  });
  document.getElementById('summary').innerHTML =
    '<div class="summary-item"><div class="num income">+' + totalIncome.toFixed(2) + '</div><div class="lbl">总收入</div></div>' +
    '<div class="summary-item"><div class="num expense">-' + totalExpense.toFixed(2) + '</div><div class="lbl">总支出</div></div>' +
    '<div class="summary-item"><div class="num" style="color:' + (totalIncome - totalExpense >= 0 ? '#080' : '#c00') + '">' + (totalIncome - totalExpense).toFixed(2) + '</div><div class="lbl">结余</div></div>';

  // Entries
  filteredIndices = [];
  const filtered = entries.filter((e, i) => {
    if (currentFilter === 'all' || e.type === currentFilter) {
      filteredIndices.push(i);
      return true;
    }
    return false;
  });

  const el = document.getElementById('entryList');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty">暂无记录</div>';
    return;
  }
  el.innerHTML = filtered.map((e, i) =>
    '<div class="entry">' +
      '<div class="amt ' + e.type + '">' + (e.type === 'income' ? '+' : '-') + e.amt.toFixed(2) + '</div>' +
      '<div class="cat">' + e.cat + '</div>' +
      '<div class="note">' + (e.note || '') + '</div>' +
      '<div class="date2">' + e.date + '</div>' +
      '<div class="del" onclick="delEntry(' + i + ')">&times;</div>' +
    '</div>'
  ).join('');
}

render();
</script>
</body>
</html>
