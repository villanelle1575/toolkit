<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具集</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #222; line-height: 1.6; }
.container { max-width: 720px; margin: 0 auto; padding: 32px 16px; }
h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
.subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
.tool-list { display: flex; flex-direction: column; gap: 8px; }
.tool-item { display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 14px 16px; text-decoration: none; color: inherit; transition: border-color .15s; }
.tool-item:hover { border-color: #888; }
.tool-name { font-weight: 500; font-size: 1rem; }
.tool-desc { color: #888; font-size: 0.85rem; margin-top: 2px; }
.status-bar { margin-top: 32px; padding: 12px 16px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 0.85rem; color: #666; }
</style>
</head>
<body>
<div class="container">
<h1>🧰 工具集</h1>
<p class="subtitle">每天一个实用小工具</p>
<div class="tool-list" id="toolList">
  <a href="tools/split-bill.html" class="tool-item" style="margin-bottom:4px;">
    <div>
      <div class="tool-name">分账计算器</div>
      <div class="tool-desc">多人消费AA分摊，支持多轮次合并结算</div>
    </div>
  </a>
  <a href="donate.html" class="tool-item" style="border-color:#ccc;border-style:dashed;">
    <div>
      <div class="tool-name">☕ 赞赏支持</div>
      <div class="tool-desc">如果好用，欢迎请一杯咖啡</div>
    </div>
  </a>
  <div id="morePlaceholder"></div>
</div>
<div class="status-bar" id="statusBar">加载中...</div>
</div>
<script>
const statusBar = document.getElementById('statusBar');
const toolCount = document.querySelectorAll('.tool-item:not([href*="donate"])').length;
statusBar.textContent = `当前共 ${toolCount} 个工具 · 每日更新一个`;
</script>
</body>
</html>
